version: '3.3'
services:
  backend:
    build: ./backend
    container_name: paycrypto_backend
    volumes:
      - ./backend:/app
    restart: always
  nginx:
    image: nginx:alpine
    container_name: paycrypto_nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always
